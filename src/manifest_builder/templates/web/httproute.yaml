apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{k8s_name}}
spec:
  parentRefs:
    - name: {{k8s_name}}
      group: gateway.networking.k8s.io
      kind: Gateway
  hostnames:
    - {{name}}
{{#extra_hostnames}}
    - {{hostname}}
{{/extra_hostnames}}
  rules:
    - backendRefs:
        - name: {{k8s_name}}
          port: 80
          group: ""
          kind: Service
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
