apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{k8s_name}}
  labels:
    app: {{k8s_name}}
spec:
  replicas: {{replicas}}
  selector:
    matchLabels:
      app: {{k8s_name}}
  template:
    metadata:
      labels:
        app: {{k8s_name}}
    spec:
{{#service_account}}
      serviceAccountName: {{name}}
{{/service_account}}
      containers:
        - name: {{k8s_name}}
          image: {{image}}
          ports:
            - name: http
              containerPort: 8080
{{#args}}
          args:
{{#args}}
            - {{.}}
{{/args}}
{{/args}}
